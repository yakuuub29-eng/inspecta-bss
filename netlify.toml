# PT Bina Sarana Sukses — SHE Department

[build]
  publish = "."

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

# ── Cache: HTML tidak di-cache (selalu fresh) ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache: SW tidak di-cache ──
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Cache: Assets di-cache lama ──
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirects ──
[[redirects]]
  from = "/"
  to = "/app-user.html"
  status = 302

[[redirects]]
  from = "/admin"
  to = "/dashboard-admin.html"
  status = 302

[[redirects]]
  from = "/dashboard"
  to = "/dashboard-admin.html"
  status = 302

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
